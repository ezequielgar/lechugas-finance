services:
  db:
    image: mariadb:10.11
    restart: always
    networks:
      - internal
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p${DB_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    restart: always
    networks:
      - internal
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: mysql://${DB_USER}:${DB_PASSWORD}@db:3306/${DB_NAME}
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      PORT: 3001
      NODE_ENV: production
      CORS_ORIGIN: https://${DOMAIN}
    volumes:
      - backend_uploads:/app/uploads/products

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: ""
    restart: always
    networks:
      - internal
      - proxy
    depends_on:
      - backend
    environment:
      VIRTUAL_HOST: ${DOMAIN}
      VIRTUAL_PORT: 80
      LETSENCRYPT_HOST: ${DOMAIN}
      LETSENCRYPT_EMAIL: ${LETSENCRYPT_EMAIL}

networks:
  internal:
    driver: bridge
  proxy:
    external: true
    name: ${NGINX_PROXY_NETWORK}

volumes:
  db_data:
  backend_uploads:
